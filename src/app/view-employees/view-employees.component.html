<div class="container">

  <div class="header">
    <h2>Employees</h2>
    <button class="btn primary" routerLink="/add">+ Add Employee</button>
  </div>

  <div class="table-card">

    <table *ngIf="employees.length > 0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th class="actions">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let emp of employees">
          <td>{{ emp.name }}</td>
          <td>{{ emp.email }}</td>
          <td class="actions">
            <button class="btn edit" (click)="edit(emp.id)">Edit</button>
            <button class="btn delete" (click)="delete(emp.id)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="employees.length === 0" class="empty">
      No employees found
    </p>

  </div>

</div>
