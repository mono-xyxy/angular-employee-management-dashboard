<div class="container">
  <div class="card">
    <h2>Add Employee</h2>

    <form [formGroup]="form">

      <div class="form-group">
        <input formControlName="name" placeholder="Enter Name">
        <span *ngIf="form.get('name')?.touched && form.get('name')?.invalid">
          Name is required
        </span>
      </div>

      <div class="form-group">
        <input formControlName="email" placeholder="Enter Email">
        <span *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Valid email required
        </span>
      </div>

      <button class="btn primary" type="button" (click)="submit()">Save</button>

    </form>

    <button class="btn secondary" routerLink="/">⬅ Back to Employees</button>
  </div>
</div>
